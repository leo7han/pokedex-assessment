<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokedex - Old St. Labs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Pokedex</h1>
    <div id="controls">
      <input type="text" id="search" placeholder="Search by Name or ID">

      <select id = "sortDropdown">
        <option value="id-asc">Sort by ID (Lowest First)</option>
        <option value="id-desc">Sort by ID (Highest First)</option>
        <option value="name-asc">Sort by Name (A-Z)</option>
        <option value="name-desc">Sort by Name (Z-A)</option>
      </select>
    </div>
  </header>
  
  <main>
    <div id="pokedex-container" class="grid-container"></div>

    <button id="loadMoreBtn">Load More</button>
  </main>

  <div id="pokemon-modal" class="hidden">
    <div class="modal-content">
      <span id="closeModal" class="close-btn">&times;</span>
      
      <div class="modal-header">
        <h2 id="modalName">Name</h2>
        <span id="modalId">#000</span>
      </div>

      <img id="modalImage" src="" alt="Pokemon">
      
      <div class="modal-body">
        <p><strong>Height:</strong> <span id="modalHeight"></span></p>
        <p><strong>Weight:</strong> <span id="modalWeight"></span></p>
        
        <div class="modal-section">
          <h3>Types</h3>
          <div id="modalTypes" class="types"></div>
        </div>

        <div class="modal-section">
          <h3>Weaknesses</h3>
          <div id="modalWeaknesses" class="types"></div>
        </div>

        <div class="modal-section">
          <h3>Base Stats</h3>
          <ul id="modalStats" class="stats-list"></ul>
        </div>
      </div>

      <div class="modal-footer">
        <button id="prevBtn">&laquo; Previous</button>
        <button id="nextBtn">Next &raquo;</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
